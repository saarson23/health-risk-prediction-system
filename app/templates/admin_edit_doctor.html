{% extends "base.html" %}{% block title %}Edit Doctor{% endblock %}{% block content %}<section style="padding:3rem 0"><div class="container"><div class="row justify-content-center"><div class="col-md-8"><div class="card-dark"><h3 style="font-family:Space Grotesk;margin-bottom:1.5rem"><i class="fas fa-edit me-2" style="color:#00c9a7"></i>Edit Doctor</h3><form method="POST"><div class="row g-3"><div class="col-md-6"><label class="form-label">Doctor Name</label><input type="text" name="doctor_name" class="form-control form-control-dark" value="{{ doctor.doctor_name }}" required></div><div class="col-md-6"><label class="form-label">Department</label><input type="text" name="department" class="form-control form-control-dark" value="{{ doctor.department }}" required></div><div class="col-md-6"><label class="form-label">Hospital</label><input type="text" name="hospital_name" class="form-control form-control-dark" value="{{ doctor.hospital_name }}" required></div><div class="col-md-6"><label class="form-label">Location</label><input type="text" name="location" class="form-control form-control-dark" value="{{ doctor.location }}"></div><div class="col-md-6"><label class="form-label">Phone</label><input type="text" name="phone" class="form-control form-control-dark" value="{{ doctor.phone }}"></div><div class="col-md-6"><label class="form-label">Rating</label><input type="number" step="0.1" min="1" max="5" name="rating" class="form-control form-control-dark" value="{{ doctor.rating }}"></div><div class="col-md-12"><label class="form-label">Qualification</label><input type="text" name="qualification" class="form-control form-control-dark" value="{{ doctor.qualification }}"></div><div class="col-md-6"><label class="form-label">OPD Schedule</label><input type="text" name="opd_schedule" class="form-control form-control-dark" value="{{ doctor.opd_schedule }}"></div><div class="col-md-6"><label class="form-label">Hours</label><input type="text" name="hours" class="form-control form-control-dark" value="{{ doctor.hours }}"></div><div class="col-md-6"><label class="form-label">Type</label><input type="text" name="type" class="form-control form-control-dark" value="{{ doctor.type }}"></div><div class="col-md-12"><label class="form-label">Diseases Treated</label><input type="text" name="diseases_treated" class="form-control form-control-dark" value="{{ doctor.diseases_treated }}"></div><div class="col-md-12"><label class="form-label">Notes</label><input type="text" name="notes" class="form-control form-control-dark" value="{{ doctor.notes }}"></div></div><div class="d-flex gap-2 mt-4"><button type="submit" class="btn btn-accent"><i class="fas fa-save me-2"></i>Save</button><a href="{{ url_for('admin.admin_doctors') }}" class="btn btn-outline-light-custom">Cancel</a></div></form></div></div></div></div></section>{% endblock %}
