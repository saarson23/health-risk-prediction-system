{% extends "base.html" %}{% block title %}Edit User{% endblock %}{% block content %}<section style="padding:3rem 0">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card-dark">
                    <h3 style="font-family:Space Grotesk;margin-bottom:1.5rem"><i class="fas fa-user-edit me-2"
                            style="color:#00c9a7"></i>Edit User</h3>
                    <form method="POST">
                        <div class="row g-3">
                            <div class="col-md-12"><label class="form-label">Username</label><input type="text"
                                    name="username" class="form-control form-control-dark" value="{{ user.username }}"
                                    required></div>
                            <div class="col-md-12"><label class="form-label">Email</label><input type="email"
                                    name="email" class="form-control form-control-dark" value="{{ user.email }}"
                                    required></div>
                            <div class="col-md-12"><label class="form-label">Phone</label><input type="text"
                                    name="phone" class="form-control form-control-dark" value="{{ user.phone or '' }}">
                            </div>
                        </div>
                        <div class="d-flex gap-2 mt-4"><button type="submit" class="btn btn-accent"><i
                                    class="fas fa-save me-2"></i>Save</button><a
                                href="{{ url_for('admin.admin_users') }}"
                                class="btn btn-outline-light-custom">Cancel</a></div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>{% endblock %}
