<!-- app/templates/predict.html -->
{% extends "base.html" %}
{% block title %}Health Prediction - HealthPredict AI{% endblock %}

{% block content %}
<section style="padding: 3rem 0;">
    <div class="container">
        <div class="text-center mb-4 animate-in">
            <h2 class="section-title"><i class="fas fa-stethoscope me-2" style="color: var(--accent);"></i>Health Risk Prediction</h2>
            <p class="section-subtitle">Select a disease type and enter your medical data</p>
        </div>

        <!-- Disease Type Selector -->
        <div class="row justify-content-center mb-4 animate-in delay-1">
            <div class="col-md-8">
                <div class="d-flex gap-3 justify-content-center">
                    <button class="btn btn-outline-light-custom active" id="btn-heart" onclick="showForm('heart')">
                        <i class="fas fa-heart me-2" style="color: #e74c3c;"></i>Heart Disease
                    </button>
                    <button class="btn btn-outline-light-custom" id="btn-diabetes" onclick="showForm('diabetes')">
                        <i class="fas fa-tint me-2" style="color: #3498db;"></i>Diabetes
                    </button>
                </div>
            </div>
        </div>

        <!-- Heart Disease Form -->
        <div id="heart-form" class="row justify-content-center animate-in delay-2">
            <div class="col-md-8">
                <div class="card-dark">
                    <h5 style="font-family: 'Space Grotesk'; margin-bottom: 1.5rem;">
                        <i class="fas fa-heart me-2" style="color: #e74c3c;"></i>Heart Disease Assessment
                    </h5>
                    <form method="POST" action="{{ url_for('predict.predict') }}">
                        <input type="hidden" name="disease_type" value="heart">

                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label">Age</label>
                                <input type="number" name="age" class="form-control form-control-dark" placeholder="e.g. 45" required min="1" max="120">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Sex</label>
                                <select name="sex" class="form-control form-control-dark form-select-dark" required>
                                    <option value="">Select</option>
                                    <option value="1">Male</option>
                                    <option value="0">Female</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Chest Pain Type</label>
                                <select name="cp" class="form-control form-control-dark form-select-dark" required>
                                    <option value="">Select</option>
                                    <option value="0">Typical Angina</option>
                                    <option value="1">Atypical Angina</option>
                                    <option value="2">Non-anginal Pain</option>
                                    <option value="3">Asymptomatic</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Resting BP (mm Hg)</label>
                                <input type="number" name="trestbps" class="form-control form-control-dark" placeholder="e.g. 120" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Cholesterol (mg/dl)</label>
                                <input type="number" name="chol" class="form-control form-control-dark" placeholder="e.g. 200" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Fasting Blood Sugar > 120</label>
                                <select name="fbs" class="form-control form-control-dark form-select-dark" required>
                                    <option value="">Select</option>
                                    <option value="1">Yes</option>
                                    <option value="0">No</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Resting ECG</label>
                                <select name="restecg" class="form-control form-control-dark form-select-dark" required>
                                    <option value="">Select</option>
                                    <option value="0">Normal</option>
                                    <option value="1">ST-T Abnormality</option>
                                    <option value="2">Left Ventricular Hypertrophy</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Max Heart Rate</label>
                                <input type="number" name="thalach" class="form-control form-control-dark" placeholder="e.g. 150" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Exercise Induced Angina</label>
                                <select name="exang" class="form-control form-control-dark form-select-dark" required>
                                    <option value="">Select</option>
                                    <option value="1">Yes</option>
                                    <option value="0">No</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">ST Depression (oldpeak)</label>
                                <input type="number" step="0.1" name="oldpeak" class="form-control form-control-dark" placeholder="e.g. 1.0" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Slope of ST Segment</label>
                                <select name="slope" class="form-control form-control-dark form-select-dark" required>
                                    <option value="">Select</option>
                                    <option value="0">Upsloping</option>
                                    <option value="1">Flat</option>
                                    <option value="2">Downsloping</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Number of Vessels (ca)</label>
                                <select name="ca" class="form-control form-control-dark form-select-dark" required>
                                    <option value="">Select</option>
                                    <option value="0">0</option>
                                    <option value="1">1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Thalassemia</label>
                                <select name="thal" class="form-control form-control-dark form-select-dark" required>
                                    <option value="">Select</option>
                                    <option value="0">Normal</option>
                                    <option value="1">Fixed Defect</option>
                                    <option value="2">Reversible Defect</option>
                                </select>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-accent mt-4 w-100">
                            <i class="fas fa-search-plus me-2"></i>Analyse & Predict
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Diabetes Form -->
        <div id="diabetes-form" class="row justify-content-center" style="display: none;">
            <div class="col-md-8">
                <div class="card-dark">
                    <h5 style="font-family: 'Space Grotesk'; margin-bottom: 1.5rem;">
                        <i class="fas fa-tint me-2" style="color: #3498db;"></i>Diabetes Assessment
                    </h5>
                    <form method="POST" action="{{ url_for('predict.predict') }}">
                        <input type="hidden" name="disease_type" value="diabetes">

                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label">Pregnancies</label>
                                <input type="number" name="pregnancies" class="form-control form-control-dark" placeholder="e.g. 2" required min="0">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Glucose (mg/dl)</label>
                                <input type="number" name="glucose" class="form-control form-control-dark" placeholder="e.g. 120" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Blood Pressure (mm Hg)</label>
                                <input type="number" name="blood_pressure" class="form-control form-control-dark" placeholder="e.g. 70" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Skin Thickness (mm)</label>
                                <input type="number" name="skin_thickness" class="form-control form-control-dark" placeholder="e.g. 20" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Insulin (mu U/ml)</label>
                                <input type="number" name="insulin" class="form-control form-control-dark" placeholder="e.g. 80" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">BMI</label>
                                <input type="number" step="0.1" name="bmi" class="form-control form-control-dark" placeholder="e.g. 25.5" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Diabetes Pedigree Function</label>
                                <input type="number" step="0.001" name="dpf" class="form-control form-control-dark" placeholder="e.g. 0.500" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Age</label>
                                <input type="number" name="age" class="form-control form-control-dark" placeholder="e.g. 33" required min="1" max="120">
                            </div>
                        </div>

                        <button type="submit" class="btn btn-accent mt-4 w-100">
                            <i class="fas fa-search-plus me-2"></i>Analyse & Predict
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
function showForm(type) {
    document.getElementById('heart-form').style.display = type === 'heart' ? 'flex' : 'none';
    document.getElementById('diabetes-form').style.display = type === 'diabetes' ? 'flex' : 'none';
    document.getElementById('btn-heart').classList.toggle('active', type === 'heart');
    document.getElementById('btn-diabetes').classList.toggle('active', type === 'diabetes');

    // Update active button style
    const activeStyle = 'background: var(--glass); border-color: var(--accent);';
    document.getElementById('btn-heart').style.cssText = type === 'heart' ? activeStyle : '';
    document.getElementById('btn-diabetes').style.cssText = type === 'diabetes' ? activeStyle : '';
}
</script>
{% endblock %}
