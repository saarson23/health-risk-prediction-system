<!-- app/templates/register.html -->
{% extends "base.html" %}
{% block title %}Register - HealthPredict AI{% endblock %}

{% block content %}
<section style="padding: 5rem 0;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card-dark animate-in">
                    <div class="text-center mb-4">
                        <i class="fas fa-user-plus" style="font-size: 2.5rem; color: var(--accent);"></i>
                        <h3 style="font-family: 'Space Grotesk'; font-weight: 700; margin-top: 0.8rem;">Create Account</h3>
                        <p style="color: var(--text-muted);">Start predicting your health risks today</p>
                    </div>

                    <form method="POST" action="{{ url_for('auth.register') }}">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" name="username" class="form-control form-control-dark" placeholder="Choose a username" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" name="email" class="form-control form-control-dark" placeholder="your@email.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Phone (for SMS alerts)</label>
                            <input type="tel" name="phone" class="form-control form-control-dark" placeholder="+977 XXXXXXXXXX">
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control form-control-dark" placeholder="Create a strong password" required minlength="6">
                        </div>
                        <button type="submit" class="btn btn-accent w-100">
                            <i class="fas fa-user-plus me-2"></i>Create Account
                        </button>
                    </form>

                    <div class="text-center mt-4">
                        <p style="color: var(--text-muted);">
                            Already have an account?
                            <a href="{{ url_for('auth.login') }}" style="color: var(--accent); text-decoration: none; font-weight: 600;">Login here</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
